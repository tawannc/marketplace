<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Marketplace{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container d-flex justify-content-between align-items-center">

        <a class="navbar-brand" href="/">Marketplace</a>

        <form class="d-flex" method="get" action="/buscar/">
            <input class="form-control me-2" type="search" name="q" placeholder="Buscar..." aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Buscar</button>
        </form>

        <ul class="navbar-nav flex-row">
            <li class="nav-item me-3">
                <a class="nav-link" href="/produtos/carrinho/">Carrinho</a>
            </li>

            <li class="nav-item me-3">
                <a class="nav-link" href="/meus-pedidos/">Meus pedidos</a>
            </li>

            {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="/contas/logout/">Sair</a>
                </li>
            {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="/contas/login/">Entrar</a>
                </li>
            {% endif %}
        </ul>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
