{% extends 'core/base.html' %}

{% block content %}
<h2>Novo Produto</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <label>Imagens (até 5):</label>
    <input type="file" name="images" multiple class="form-control">

    <button class="btn btn-success mt-3">Salvar</button>
</form>
{% endblock %}
