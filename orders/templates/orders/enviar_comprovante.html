{% extends 'core/base.html' %}

{% block content %}
<h2>Enviar comprovante do pedido #{{ order.id }}</h2>

<div class="alert alert-info">
    <p><strong>Chave PIX do vendedor:</strong> {{ order.seller.pix_key }}</p>
    <p>Faça o pagamento e envie o comprovante abaixo.</p>
</div>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label for="comprovante">Selecione o comprovante:</label>
    <input type="file" name="comprovante" id="comprovante" class="form-control mb-3" required>

    <button class="btn btn-primary">Enviar comprovante</button>
</form>

<a href="/minhas-compras/" class="btn btn-secondary mt-3">Voltar</a>
{% endblock %}
